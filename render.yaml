#
# Render Blueprint: RideWise (FastAPI + served frontend)
# https://render.com/docs/blueprint-spec
#
# Deploys a single web service that serves:
#   - `GET /` (the professionally styled RideWise webpage)
#   - `POST /predict` (the churn prediction endpoint)

services:
  - type: web
    name: ridewise
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port ${PORT}"
    healthCheckPath: /health
    envVars:
      # Use ONE Web Service for HTML + API. If you use a separate Static Site for the UI,
      # set RIDEWISE_PUBLIC_API_URL to this service URL and add that site's origin to CORS_ORIGINS.
      - key: RIDEWISE_PUBLIC_API_URL
        value: ""
      - key: CORS_ORIGINS
        value: "*"
